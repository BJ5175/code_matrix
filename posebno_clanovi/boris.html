<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boris Josipović | Manager | CodeMatrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #7000ff;
            --accent-light: #00d9ff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-gray: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Pozadinski sjaj */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            top: 30%;
            right: -10%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { color: var(--accent-light); }

        .profile-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 217, 255, 0.3);
        }

        /* Kontejner za sliku sa zoom efektom */
        .img-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid var(--accent-light);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .profile-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .profile-card:hover img {
            transform: scale(1.1);
        }

        /* Gradijent naslov - Popravljen webkit error */
        .profile-card h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #aaaaaa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: white; /* Fallback */
            font-weight: 800;
        }

        .profile-card .role {
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .profile-card p {
            color: var(--text-gray);
            margin-bottom: 35px;
            font-size: 1.1rem;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: 1px solid #fff;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            border-color: var(--accent-light);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 217, 255, 0.2);
        }

        .btn-outline {
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <nav>
        <a href="index.html" class="logo"><i class="fas fa-microchip"></i>CodeMatrix</a>
        <a href="../about_us.html" class="btn-outline" style="padding: 10px 25px; font-size: 0.8rem; border-radius: 50px; text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </nav>

    <main class="profile-container">
        <section class="profile-card">
            <div class="img-container">
                <img src="boris.png" alt="Boris Josipović">
            </div>
            
            <h1>Boris Josipović</h1>
            <div class="role">Manager</div>
            
            <p>The strategic mind behind CodeMatrix. Responsible for team coordination, project vision, and ensuring that our users get the best possible experience.</p>
            
            <div class="btn-group">
                <a href="https://bj-sites.vercel.app/" target="_blank" class="btn btn-primary">
                    <i class="fas fa-external-link-alt"></i> View my Site
                </a>
                <a href="https://github.com/BJ5175" class="btn btn-outline">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 CodeMatrix. Sva prava pridržana.
    </footer>

</body>
</html>
